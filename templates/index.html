<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOOL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="wrapper">
    <form method="GET" action="{{url_for('save_data')}}">
        <div id="wizard">
            <h4 class="text-center">FORM</h4>
            <section>
                <div class="form-row">
                    <input type="text" class="form-control" placeholder="Reg No" name="regno">
                </div>
                <div class="form-row"> <input type="text" class="form-control" placeholder="Name" name="name"> </div>
                <div class="form-row"> <input type="text" class="form-control" placeholder="Class" name="class"> </div>
                <div class="form-row"> <input type="text" class="form-control" placeholder="Math" name="math"> </div>
                <div class="form-row"> <input type="text" class="form-control" placeholder="English" name="english"> </div>
                <div class="form-row"> <input type="text" class="form-control" placeholder="Science" name="science"> </div>
                <div class="form-row"> <input type="text" class="form-control" placeholder="Computer" name="computer"> </div>
            </section>

            <button type="submit" class="btn-primary">Submit</button>
        </div>

    </form>
</div>
</body>
</html>
